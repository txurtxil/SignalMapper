name: Compilar APK Flet

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Compilar APK con Permisos Android (CORREGIDO)
        run: |
          yes | flet build apk \
            --android-permissions android.permission.INTERNET=true \
            android.permission.ACCESS_FINE_LOCATION=true \
            android.permission.ACCESS_COARSE_LOCATION=true \
            android.permission.ACCESS_WIFI_STATE=true \
            android.permission.CHANGE_WIFI_STATE=true

      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: SignalMapper-APK
          path: build/apk/**/*.apk
