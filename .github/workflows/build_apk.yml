name: Compilar APK Flet

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install flet
      - name: Preparar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Compilar APK
        # CLAVE: Añadimos explícitamente los permisos de Android
        run: yes | flet build apk --permissions location,access_wifi_state,internet
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalMapper-APK
          path: build/apk/**/*.apk
